name: Build OpenWrt x86_64 Package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build luci-app-camera-access-control (x86_64, OpenWrt 23.05)
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    env:
      OPENWRT_VERSION: "23.05.5"
      OPENWRT_FEED_BRANCH: "openwrt-23.05"
      SDK_ARCHIVE: "openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
      SDK_URL: "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
      PKG_NAME: "luci-app-camera-access-control"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache file g++ gawk gettext git \
            libelf-dev libncurses5-dev libncursesw5-dev libssl-dev \
            python3 python3-setuptools rsync subversion swig \
            time unzip wget xsltproc zlib1g-dev

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-x86_64

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ env.SDK_URL }}" -O "${{ env.SDK_ARCHIVE }}"
          mkdir openwrt-sdk
          tar -xf "${{ env.SDK_ARCHIVE }}" -C openwrt-sdk --strip-components=1
          rm -f "${{ env.SDK_ARCHIVE }}"

      - name: Copy package into SDK
        run: |
          pkg_dir="openwrt-sdk/package/${{ env.PKG_NAME }}"
          mkdir -p "$pkg_dir"
          rsync -a --exclude='.git' --exclude='openwrt-sdk' \
            --exclude='.github' . "$pkg_dir/"

      - name: Configure SDK feeds
        run: |
          cd openwrt-sdk
          printf 'src-git packages https://git.openwrt.org/feed/packages.git;%s\n' "${{ env.OPENWRT_FEED_BRANCH }}" > feeds.conf.default
          printf 'src-git luci    https://git.openwrt.org/project/luci.git;%s\n' "${{ env.OPENWRT_FEED_BRANCH }}" >> feeds.conf.default
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a -p packages
          ./scripts/feeds install -a -p luci

      - name: Generate SDK .config
        run: |
          cd openwrt-sdk
          # Avoid building optional liblucihttp-lua in SDK CI; this prevents
          # lua.h header failures while keeping LuCI ucode path intact.
          echo "CONFIG_PACKAGE_liblucihttp-lua=n" >> .config
          echo "CONFIG_PACKAGE_${{ env.PKG_NAME }}=m" >> .config
          make defconfig

      - name: Build package
        run: |
          cd openwrt-sdk
          make package/${{ env.PKG_NAME }}/compile V=s
          echo "--- Build finished ---"

      - name: Collect built .ipk files
        run: |
          mkdir -p /tmp/artifacts
          find openwrt-sdk/bin/packages -name "${{ env.PKG_NAME }}*.ipk" \
            -exec cp {} /tmp/artifacts/ \;
          echo "=== Built packages ==="
          ls -lh /tmp/artifacts/

      - name: Upload .ipk as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-ipk
          path: /tmp/artifacts/*.ipk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release and attach .ipk
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/artifacts/*.ipk
          generate_release_notes: true
          body: |
            ## ${{ env.PKG_NAME }} ${{ github.ref_name }}

            Built against OpenWrt ${{ env.OPENWRT_VERSION }} (x86_64).

            ### Installation
            Copy the `.ipk` file to your router and install with:
            ```sh
            opkg install ${{ env.PKG_NAME }}_*.ipk
            ```
